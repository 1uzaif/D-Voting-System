<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Voting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="assets/logo.png" alt="Logo" class="logo">
            <h1>Decentralized Voting System</h1>
        </header>

        <div id="connect-section">
            <button id="connect-btn">Connect MetaMask</button>
            <p id="account"></p>
        </div>

        <div id="voting-section" class="hidden">
            <h2>Candidates</h2>
            <div id="candidates-list"></div>
            
            <button id="start-voting" class="admin-only hidden">Start Voting (Admin)</button>
            <button id="end-voting" class="admin-only hidden">End Voting (Admin)</button>
        </div>

        <div id="results-section">
            <h2>Live Results</h2>
            <div id="results-list"></div>
        </div>
    </div>

    <script src="js/web3.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
